<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Defensive guard to prevent 'Cannot redefine property: ethereum' type errors 
      // caused by third-party browser extensions inside preview iframe environments.
      try {
        let ethereumStore = undefined;
        Object.defineProperty(window, 'ethereum', {
          get() { return ethereumStore; },
          set(val) { ethereumStore = val; },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("AAMA Web3 Sandbox Guard:", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
