<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Defensive guard to prevent 'Cannot redefine property: ethereum' type errors 
      // caused by third-party browser extensions inside preview iframe environments.
      try {
        const desc = Object.getOwnPropertyDescriptor(window, 'ethereum');
        if (!desc || desc.configurable) {
          let ethereumStore = window.ethereum;
          Object.defineProperty(window, 'ethereum', {
            get() { return ethereumStore; },
            set(val) { ethereumStore = val; },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn("AAMA Web3 Sandbox Guard initial define failed:", e);
      }

      // Intercept Object.defineProperty requests for window.ethereum to gracefully
      // absorb any errors thrown when external wallet extensions try to redefine it.
      try {
        const originalDefineProperty = Object.defineProperty;
        Object.defineProperty = function(obj, prop, descriptor) {
          if (obj === window && prop === 'ethereum') {
            try {
              return originalDefineProperty.apply(this, arguments);
            } catch (err) {
              console.warn("Prevented uncaught TypeError for ethereum property redefinition:", err);
              return obj;
            }
          }
          return originalDefineProperty.apply(this, arguments);
        };
      } catch (e) {
        console.warn("AAMA Web3 Object.defineProperty patch failed:", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
